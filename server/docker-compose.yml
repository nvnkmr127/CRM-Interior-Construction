version: '3.8'

services:
  # Primary Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache & Queues
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Node.js API Backend (Scaled to 3 instances)
  api:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgres://crm_user:crm_password@postgres:5432/crm_db
      - READ_DATABASE_URL=postgres://crm_user:crm_password@postgres:5432/crm_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_docker_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 3 # Simulate horizontal scaling
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
