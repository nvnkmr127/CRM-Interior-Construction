events {
    worker_connections 1024;
}

http {
    # Define an upstream block to load balance across the 3 API containers
    # Docker's internal DNS automatically resolves 'api' to all replica IP addresses
    upstream crm_backend {
        least_conn; # Send traffic to the container with the least active connections
        server api:5000;
    }

    # Define a rate limit zone: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # Gzip compression for faster API responses
        gzip on;
        gzip_types application/json;
        gzip_min_length 1000;

        # Main API routing
        location /api/ {
            # Apply rate limiting (allow bursts up to 20 without delay)
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://crm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout configurations
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Healthcheck endpoint for AWS ALB or Kubernetes
        location /health {
            access_log off;
            return 200 "OK";
        }
    }
}
